<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(135deg, rgba(30,41,59,0.8) 0%, rgba(15,23,42,0.9) 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-weight: 800;
            font-size: 2.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        p.subtitle {
            margin: 0.5rem 0 0 0;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem;
            box-sizing: border-box;
        }

        .video-container {
            background: var(--container-bg);
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .video-container::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #3b82f6, #8b5cf6, #ec4899);
            z-index: -1;
            border-radius: 22px;
            opacity: 0.3;
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        img.feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            background-color: #000;
        }

        .status-panel {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            background: rgba(30, 41, 59, 0.6);
            padding: 1rem 2rem;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        
        .instructions {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sign Language Translator</h1>
        <p class="subtitle">Real-time AI gesture recognition</p>
    </header>

    <main>
        <div class="video-container">
            <img class="feed" src="{{ url_for('video_feed') }}" alt="Video Feed Loading...">
        </div>

        <div class="status-panel">
            <div class="status-dot"></div>
            <div class="status-text">Live Translation Active</div>
        </div>
        
        <div class="instructions">
            Position yourself in front of the camera and perform sign language gestures. 
            The AI model will detect your hand signs and draw bounding boxes with translations in real-time.
        </div>
    </main>
</body>
</html>
